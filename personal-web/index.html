<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- TODO: Set the document title to the name of your application -->
  <title>Personal Banking</title>
  <meta name="description" content="Secure personal banking portal." />
  <meta name="author" content="Platform Admin" />
  <script>
    (function() {
      try {
        const cached = localStorage.getItem("platform_brand_config");
        if (cached) {
          const { data } = JSON.parse(cached);
          if (data && data.meta) {
            if (data.meta.title) document.title = data.meta.title;
            if (data.meta.description) document.querySelector('meta[name="description"]')?.setAttribute("content", data.meta.description);
            if (data.meta.author) document.querySelector('meta[name="author"]')?.setAttribute("content", data.meta.author);
          }
        }
      } catch (e) {}
    })();
  </script>

  <!-- TODO: Update og:title to match your application name -->
  <meta property="og:title" content="Personal Banking" />
  <meta property="og:description" content="Secure personal banking portal." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@Platform" />
  <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
